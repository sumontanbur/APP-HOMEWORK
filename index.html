<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Home Screen -->
    <section id="home-screen" class="screen">
        <h1>SpendWise</h1>
        <div class="card">
            <p>Total Spent</p>
            <h2 id="total-display">$0.00</h2>
        </div>
        <button onclick="showScreen('form-screen')" class="btn-main">Add Expense</button>
        <button onclick="showScreen('summary-screen')" class="btn-secondary">View History</button>
    </section>

    <!-- Form Screen -->
    <section id="form-screen" class="screen" style="display:none;">
        <button onclick="showScreen('home-screen')" class="back-link">← Back</button>
        <h2>New Expense</h2>
        <form id="expense-form">
            <div class="field">
                <label>Item Name</label>
                <input type="text" id="itemName" placeholder="e.g. Lunch">
                <span class="error" id="name-err"></span>
            </div>
            <div class="field">
                <label>Amount ($)</label>
                <input type="number" id="amount" step="0.01">
                <span class="error" id="amount-err"></span>
            </div>
            <div class="field">
                <label>Category</label>
                <select id="category">
                    <option value="">Select...</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Study">Study</option>
                </select>
                <span class="error" id="cat-err"></span>
            </div>
            <div class="field">
                <label>Date</label>
                <input type="date" id="date">
                <span class="error" id="date-err"></span>
            </div>
            <button type="submit" class="btn-main">Save Expense</button>
        </form>
    </section>

    <!-- Summary Screen -->
    <section id="summary-screen" class="screen" style="display:none;">
        <button onclick="showScreen('home-screen')" class="back-link">← Home</button>
        <h2>History</h2>
        <div id="history-list"></div>
    </section>

    <script src="app.js"></script>
</body>
</html>
